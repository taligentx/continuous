version: 1

project:
  name: com.github.knarfs.smuview

build:
  cmake:
    extra_variables:
      - DISABLE_WERROR=y
      - ENABLE_TESTS=n
      - CMAKE_EXPORT_COMPILE_COMMANDS=y
      - PYBIND11_FINDPYTHON=ON
      - CMAKE_BUILD_TYPE=MinSizeRel
    raw_environment:
      - PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$PKG_CONFIG_PATH"
      - PATH="$BUILD_DIR"/deps/bin:"$PATH"

scripts:
  pre_build:
    - |2
      # Build libserialport and libsigrok from source into deps directory
      mkdir -p "$BUILD_DIR"/deps
      for i in libserialport libsigrok; do
          git clone --depth=1 git://sigrok.org/"$i"
          pushd "$i"
          ./autogen.sh
          export PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$PKG_CONFIG_PATH"
          ./configure --prefix="$BUILD_DIR"/deps
          make -j$(nprocs)
          make install
          popd
      done

  post_build:
    - |2
      # 1. Bundle a minimal Python standard library
      pushd AppDir
      mkdir -p usr/lib/python3.10
      # Copy the base standard library (Python scripts)
      cp -r /usr/lib/python3.10/*.py usr/lib/python3.10/
      # Copy essential directories
      for dir in encodings importlib collections json logging xml urllib asyncio email html http; do
          cp -r /usr/lib/python3.10/"$dir" usr/lib/python3.10/
      done
      # Copy native modules (crucial for functionality)
      cp -r /usr/lib/python3.10/lib-dynload usr/lib/python3.10/

      # 2. Cleanup Python library to save space
      find usr/lib/python3.10 -type d -name "__pycache__" -exec rm -rf {} +
      rm -rf usr/lib/python3.10/lib-dynload/_test*

      # 3. General Cleanup
      rm -rf usr/translations
      rm -rf usr/share/doc
      rm -rf usr/share/man

      # 4. Strip binaries to minimize size
      find usr/bin -type f -executable -exec strip {} \; || true
      find usr/lib -type f -iname "*.so*" -exec strip {} \; || true
      popd
    - |2
      # Generate AppRun.sh script with Python environment variables
      cat > "$BUILD_DIR"/AppRun.sh <<\EOF
      #! /bin/bash
      export APPDIR=${APPDIR:-$(readlink -f $(dirname "$0"))}

      # Set up Python environment to use the bundled library
      export PYTHONHOME="$APPDIR"/usr
      export PYTHONPATH="$APPDIR"/usr/lib/python3.10:"$APPDIR"/usr/lib/python3.10/lib-dynload

      exec "$APPDIR"/usr/bin/smuview "$@"
      EOF
      chmod +x "$BUILD_DIR"/AppRun.sh
    - |2
      # Set VERSION from CMake generated shell script
      source cmake-build/contrib/config_version.sh
      export VERSION=${SV_VERSION_STRING}

appimage:
  linuxdeploy:
    plugins:
      - qt
    extra_args: --custom-apprun "$BUILD_DIR"/AppRun.sh
    raw_environment:
      - LD_LIBRARY_PATH="$LD_LIBRARY_PATH":"$BUILD_DIR"/deps/lib:/usr/local/lib

version: 1

project:
  name: com.github.knarfs.smuview
  #version_command: git describe --tags

build:
  cmake:
    extra_variables:
      # Taken from some other script
      - DISABLE_WERROR=y
      - ENABLE_TESTS=n
      - CMAKE_EXPORT_COMPILE_COMMANDS=y
      - PYBIND11_FINDPYTHON=ON
    raw_environment:
      # We have to pre-build some dependencies, and also want to ship our own custom Python environment
      # the CMake build system has been instructed to load the dependencies via pkg-config
      - PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$BUILD_DIR"/AppDir/usr/conda/lib/pkgconfig:"$PKG_CONFIG_PATH"
      # Also we want to use a newer CMake version
      - PATH="$BUILD_DIR"/deps/bin:"$PATH"
    script:
      - |2
        . AppDir/usr/conda/bin/activate
        echo "PKG_CONFIG_PATH (cmake): $PKG_CONFIG_PATH"

scripts:
  pre_build:
    - pushd "$BUILD_DIR"
    - |2
      # Use Micromamba instead of Miniconda for a much smaller footprint
      # Download micromamba binary
      mkdir -p bin
      curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
      export MAMBA_EXE="$(pwd)/bin/micromamba"

      # Create environment in AppDir/usr/conda with only the necessary Python version
      # Micromamba doesn't need a base environment, saving ~100MB+
      mkdir -p AppDir/usr/conda
      $MAMBA_EXE create -y -p AppDir/usr/conda -c conda-forge python=3.10

      # Link binaries to usr/bin so they are easily accessible
      mkdir -p AppDir/usr/bin
      pushd AppDir/usr/conda/bin
      for i in *; do
          ln -s ../conda/bin/"$i" ../../bin/
      done
      popd

      # Fix relocatability (similar to what the conda plugin does)
      # replace absolute paths with $APPDIR references
      [[ $BUILD_DIR = /* ]] && APPDIR_FULL="$BUILD_DIR/AppDir" || APPDIR_FULL="$(pwd)/AppDir"
      pushd "$APPDIR_FULL"
      # shebangs and basic relocatability for binaries/scripts
      for i in usr/conda/bin/*; do
          [ -f "$i" ] || continue
          sed -i "s|^#!$APPDIR_FULL/usr/conda/bin/|#!/usr/bin/env |" "$i"
      done
      popd

      # Create the hook script for linuxdeploy
      mkdir -p AppDir/apprun-hooks
      cat > AppDir/apprun-hooks/micromamba-hook.sh <<\EOF
      export APPDIR=${APPDIR:-$(readlink -f $(dirname "$0"))}
      export PATH="$APPDIR"/usr/bin:"$PATH"
      export CONDA_PREFIX="$APPDIR"/usr/conda
      export LD_LIBRARY_PATH="$APPDIR"/usr/conda/lib:"$LD_LIBRARY_PATH"
      EOF

      # Activate for the build itself
      . AppDir/usr/conda/bin/activate
    - popd
    - |2
      # Build libserialport and libsigrok
      for i in libserialport libsigrok; do
          git clone --depth=1 git://sigrok.org/"$i"
          pushd "$i"
          ./autogen.sh
          # Once libserialport is built, libsigrok can be linked against it
          export PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH (pre_build): $PKG_CONFIG_PATH"
          ./configure --prefix="$BUILD_DIR"/deps
          make -j$(nprocs)
          make install
          popd
      done

  post_build:
    - |2
      echo "=============================="
      echo "Diagnostics: Qwt / linker"
      echo "=============================="

      echo "--- Where is qwt installed?"
      find /usr /usr/local -name "libqwt*.so*" 2>/dev/null || true

      echo "--- Listing /usr/local/lib"
      ls -l /usr/local/lib || true

      echo "--- ldconfig cache"
      sudo ldconfig -p | grep qwt || true

      echo "--- ldd on smuview binary"
      ldd cmake-build/smuview || true

      echo "--- readelf dynamic section"
      readelf -d cmake-build/smuview | egrep 'NEEDED|RPATH|RUNPATH' || true

      echo "--- Environment"
      env | sort
    - |2
      # Cleanup conda
      #export CONDA_SKIP_INSTALL=1
      #export CONDA_SKIP_ADJUST_PATHS=0
      #./linuxdeploy-plugin-conda.sh --appdir AppDir
    - |2
      # Generate AppRun.sh scrip
      cat > "$BUILD_DIR"/AppRun.sh <<\EOF
      #! /bin/bash

      # Load miniconda environment
      #. "$APPDIR"/usr/conda/etc/profile.d/conda.sh
      #conda activate

      # Set up environment (manual activation for speed and portability)
      export APPDIR=${APPDIR:-$(readlink -f $(dirname "$0"))}
      export PATH="$APPDIR/usr/bin:$PATH"
      export CONDA_PREFIX="$APPDIR/usr/conda"
      export LD_LIBRARY_PATH="$APPDIR/usr/conda/lib:$LD_LIBRARY_PATH"

      # Run SmuView
      exec "$APPDIR"/usr/bin/smuview "$@"
      EOF
    - chmod +x "$BUILD_DIR"/AppRun.sh
    - |2
      # Set VERSION from CMake generated shell script
      source cmake-build/contrib/config_version.sh
      export VERSION=${SV_VERSION_STRING}

appimage:
  linuxdeploy:
    plugins:
      - qt
    extra_args: --custom-apprun "$BUILD_DIR"/AppRun.sh
    raw_environment:
      - LINUXDEPLOY_VERBOSE=1
      - LD_DEBUG=libs
      - LD_LIBRARY_PATH="$LD_LIBRARY_PATH":"$BUILD_DIR"/deps/lib:"$BUILD_DIR"/AppDir/usr/conda/lib:/usr/local/lib

version: 1

project:
  name: com.github.knarfs.smuview

build:
  cmake:
    extra_variables:
      - DISABLE_WERROR=y
      - ENABLE_TESTS=n
      - CMAKE_EXPORT_COMPILE_COMMANDS=y
      - PYBIND11_FINDPYTHON=ON
      - CMAKE_BUILD_TYPE=MinSizeRel
    raw_environment:
      - PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$PKG_CONFIG_PATH"
      - PATH="$BUILD_DIR"/deps/bin:"$PATH"

scripts:
  pre_build:
    - |2
      # Build libserialport and libsigrok from source into deps directory
      mkdir -p "$BUILD_DIR"/deps
      for i in libserialport libsigrok; do
          git clone --depth=1 git://sigrok.org/"$i"
          pushd "$i"
          ./autogen.sh
          export PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$PKG_CONFIG_PATH"
          ./configure --prefix="$BUILD_DIR"/deps
          make -j$(nprocs)
          make install
          popd
      done

  post_build:
    - |2
      # 1. Bundle a minimal Python standard library
      APPDIR_PATH="$BUILD_DIR/AppDir"
      PYTHON_DEST="$APPDIR_PATH/usr/lib/python3.10"
      mkdir -p "$PYTHON_DEST"

      # Copy essential Python files and directories
      cp -r /usr/lib/python3.10/*.py "$PYTHON_DEST"/
      for dir in encodings importlib collections json logging xml urllib asyncio email html http; do
          [ -d "/usr/lib/python3.10/$dir" ] && cp -r /usr/lib/python3.10/"$dir" "$PYTHON_DEST"/
      done
      cp -r /usr/lib/python3.10/lib-dynload "$PYTHON_DEST"/

      # 2. Aggressive Python Cleanup
      pushd "$PYTHON_DEST"
      # Remove non-essential files
      rm -f antigravity.py turtle.py turtledemo.py smtpd.py config-*.py
      rm -rf turtledemo test idlelib tkinter
      # Remove all __pycache__
      find . -type d -name "__pycache__" -exec rm -rf {} +
      # Remove test modules from lib-dynload
      rm -f lib-dynload/_test*
      popd

      # 3. Universal Cleanup (ensure these are gone even if re-added by plugins)
      rm -rf "$APPDIR_PATH"/usr/translations
      rm -rf "$APPDIR_PATH"/usr/share/doc
      rm -rf "$APPDIR_PATH"/usr/share/man
      rm -rf "$APPDIR_PATH"/usr/share/info

      # 4. Strip everything
      find "$APPDIR_PATH"/usr/bin -type f -executable -exec strip {} \; || true
      find "$APPDIR_PATH"/usr/lib -type f -iname "*.so*" -exec strip {} \; || true
    - |2
      # Generate AppRun.sh script with Python environment variables
      cat > "$BUILD_DIR"/AppRun.sh <<\EOF
      #! /bin/bash
      export APPDIR=${APPDIR:-$(readlink -f $(dirname "$0"))}

      # Set up Python environment to use the bundled library
      export PYTHONHOME="$APPDIR"/usr
      export PYTHONPATH="$APPDIR"/usr/lib/python3.10:"$APPDIR"/usr/lib/python3.10/lib-dynload

      # Enable Wayland support with X11 fallback
      export QT_QPA_PLATFORM="wayland;xcb"

      exec "$APPDIR"/usr/bin/smuview "$@"
      EOF
      chmod +x "$BUILD_DIR"/AppRun.sh
    - |2
      # Set VERSION from CMake generated shell script
      source cmake-build/contrib/config_version.sh
      export VERSION=${SV_VERSION_STRING}

appimage:
  linuxdeploy:
    plugins:
      - qt
    extra_args: --custom-apprun "$BUILD_DIR"/AppRun.sh
    raw_environment:
      - LD_LIBRARY_PATH="$LD_LIBRARY_PATH":"$BUILD_DIR"/deps/lib:/usr/local/lib
      - EXTRA_PLATFORM_PLUGINS=wayland
      - EXTRA_QT_PLUGINS=wayland-shell-integration,wayland-graphics-integration-client
